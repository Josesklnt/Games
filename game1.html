<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Defense 80s</title>
<style>
body {
margin: 0;
overflow: hidden;
background: #000;
display: flex;
flex-direction: column;
align-items: center;
height: 100vh;
font-family: 'Courier New', monospace;
color: #fff;
}
.game-header {
width: 100%;
background: #0066cc;
padding: 5px 0;
display: flex;
justify-content: space-between;
align-items: center;
position: relative;
z-index: 100;
}
.game-header div {
padding: 0 5px;
font-size: 14px;
font-weight: bold;
color: #fff;
text-shadow: 0 0 3px #000;
}
.header-buttons {
display: flex;
gap: 5px;
margin-right: 10px;
}
.header-btn {
background: #c00;
color: #fff;
border: none;
padding: 3px 8px;
font-size: 12px;
cursor: pointer;
border-radius: 3px;
text-transform: uppercase;
font-weight: bold;
letter-spacing: 1px;
box-shadow: 0 0 5px #f00;
transition: all 0.2s;
}
.header-btn:hover {
background: #f00;
box-shadow: 0 0 10px #f00;
transform: scale(1.05);
}
canvas {
width: 100%;
height: calc(100vh - 40px);
max-height: 600px;
background: #000;
}
.controls {
display: none;
}
.game-over {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
font-size: 72px;
text-align: center;
text-shadow: 0 0 10px #f00, 0 0 20px #f00;
animation: pulse 1.5s infinite;
z-index: 10;
display: none;
background: rgba(0,0,0,0.7);
padding: 20px;
border-radius: 10px;
width: 80%;
}
.win {
color: #0f0;
text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
}
.lose {
color: #f00;
text-shadow: 0 0 10px #f00, 0 0 20px #f00;
}
@keyframes pulse {
0% { transform: translate(-50%, -50%) scale(1); }
50% { transform: translate(-50%, -50%) scale(1.05); }
100% { transform: translate(-50%, -50%) scale(1); }
}
</style>
</head>
<body>
<div class="game-header">
<div id="timer">TIEMPO: 00:00</div>
<div id="levelInfo">NIVEL: 1</div>
<div id="livesCounter">VIDAS: 3</div>
<div id="bombsCounter">BOMBAS: 10</div>
<div id="bulletsCounter">BALAS: 0</div>
<div class="header-buttons">
<button class="header-btn" id="restartBtn">REINICIAR</button>
<button class="header-btn" id="exitBtn">SALIR</button>
</div>
</div>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<div class="game-over win" id="winMessage">YOU WIN!<br><span style="font-size: 36px">MISSION ACCOMPLISHED</span></div>
<div class="game-over lose" id="loseMessage">GAME OVER<br><span style="font-size: 36px">HUMANITY LOST</span></div>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const restartBtn = document.getElementById('restartBtn');
    const exitBtn = document.getElementById('exitBtn');
    const timerDisplay = document.getElementById('timer');
    const levelInfo = document.getElementById('levelInfo');
    const livesCounter = document.getElementById('livesCounter');
    const bombsCounter = document.getElementById('bombsCounter');
    const bulletsCounter = document.getElementById('bulletsCounter');
    const winMessage = document.getElementById('winMessage');
    const loseMessage = document.getElementById('loseMessage');
    
    let gameActive = false;
    let gameStartTime = 0;
    let lastAlienSpawn = 0;
    let lastBulletTime = 0;
    let alienSpeed = 1.2;
    let bulletInterval = 600;
    let gameLevel = 1;
    let lives = 3;
    let bombsLeft = 10;
    let bulletsFired = 0;
    
    const keys = {
        ArrowLeft: false,
        ArrowRight: false
    };
    
    const cannon = {
        x: canvas.width / 2,
        y: canvas.height - 30,
        width: 40,
        height: 20,
        angle: 0,
        rotationSpeed: 2.5,
        muzzleFlash: false,
        flashTime: 0,
        damaged: false,
        damageTime: 0
    };
    
    const bullets = [];
    const aliens = [];
    const explosions = [];
    const bombs = [];
    
    const alienTypes = [
        { 
            color: '#0f0', 
            shape: 'predator',
            draw: function(x, y, size) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(x, y - size * 1.2);
                ctx.lineTo(x - size, y + size);
                ctx.lineTo(x + size, y + size);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#555';
                ctx.beginPath();
                ctx.arc(x, y - size * 0.4, size * 0.8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#888';
                ctx.beginPath();
                ctx.arc(x - size * 0.3, y - size * 0.4, size * 0.2, 0, Math.PI);
                ctx.arc(x + size * 0.3, y - size * 0.4, size * 0.2, 0, Math.PI);
                ctx.fill();
                
                ctx.fillStyle = '#f00';
                ctx.beginPath();
                ctx.arc(x - size * 0.4, y - size * 0.6, size * 0.15, 0, Math.PI * 2);
                ctx.arc(x + size * 0.4, y - size * 0.6, size * 0.15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(x, y - size * 0.2, size * 0.1, 0, Math.PI * 2);
                ctx.fill();
            }
        },   
        { 
            color: '#f0f', 
            shape: 'alien',
            draw: function(x, y, size) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(x, y - size * 1.5);
                ctx.quadraticCurveTo(x + size, y - size, x + size * 0.8, y + size * 0.2);
                ctx.lineTo(x, y + size * 0.5);
                ctx.lineTo(x - size * 0.8, y + size * 0.2);
                ctx.quadraticCurveTo(x - size, y - size, x, y - size * 1.5);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(x - size * 0.4, y - size * 0.5, size * 0.2, 0, Math.PI * 2);
                ctx.arc(x + size * 0.4, y - size * 0.5, size * 0.2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#f55';
                ctx.beginPath();
                ctx.arc(x, y, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }
        },     
        { 
            color: '#0ff', 
            shape: 'invasion',
            draw: function(x, y, size) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(x - size * 0.8, y - size * 0.8);
                ctx.lineTo(x + size * 0.8, y - size * 0.8);
                ctx.lineTo(x + size * 0.8, y + size * 0.8);
                ctx.lineTo(x - size * 0.8, y + size * 0.8);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#f00';
                ctx.fillRect(x - size * 0.3, y - size * 0.3, size * 0.6, size * 0.6);
                
                ctx.fillStyle = '#0ff';
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        if (i === 0 && j === 0) continue;
                        ctx.beginPath();
                        ctx.arc(x + i * size * 0.4, y + j * size * 0.4, size * 0.1, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        },
        {
            color: '#f00',
            shape: 'exploder',
            draw: function(x, y, size) {
                const blink = Math.sin(Date.now() / 100) > 0;
                ctx.fillStyle = blink ? this.color : '#500';
                
                const pulseSize = size + Math.sin(Date.now() / 200) * 2;
                ctx.beginPath();
                ctx.arc(x, y, pulseSize, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(x, y, size * 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = blink ? '#ff0' : '#f00';
                ctx.lineWidth = 2;
                for (let i = 0; i < 8; i++) {
                    const angle = i * Math.PI / 4;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(
                        x + Math.cos(angle) * size * 1.5,
                        y + Math.sin(angle) * size * 1.5
                    );
                    ctx.stroke();
                }
            },
            explode: function(alien) {
                explosions.push({
                    x: alien.x,
                    y: alien.y,
                    radius: 5,
                    maxRadius: 60,
                    duration: 25,
                    color: '#f00'
                });
                
                for (let i = bullets.length - 1; i >= 0; i--) {
                    if (distance(bullets[i], alien) < 60) {
                        bullets.splice(i, 1);
                    }
                }
                
                for (let i = aliens.length - 1; i >= 0; i--) {
                    if (aliens[i] !== alien && distance(aliens[i], alien) < 60) {
                        aliens.splice(i, 1);
                    }
                }
            }
        }
    ];
    
    function initGame() {
        gameActive = true;
        gameStartTime = Date.now();
        lastAlienSpawn = Date.now();
        lastBulletTime = Date.now();
        setLevelParameters(gameLevel);
        bulletsFired = 0;
        cannon.angle = 0;
        cannon.damaged = false;
        cannon.damageTime = 0;
        
        bullets.length = 0;
        aliens.length = 0;
        explosions.length = 0;
        bombs.length = 0;
        
        winMessage.style.display = 'none';
        loseMessage.style.display = 'none';
        updateBombsCounter();
        updateBulletsCounter();
        updateLivesCounter();
        levelInfo.textContent = `NIVEL: ${gameLevel}`;
        
        gameLoop();
    }
    
    function setLevelParameters(level) {
        gameLevel = level;
        
        switch(level) {
            case 1:
                alienSpeed = 1.2;
                bulletInterval = 600;
                cannon.rotationSpeed = 2.5;
                break;
            case 2:
                alienSpeed = 1.8;
                bulletInterval = 350;
                cannon.rotationSpeed = 2.5;
                break;
            case 3:
                alienSpeed = 2.5;
                bulletInterval = 200;
                cannon.rotationSpeed = 3.0;
                break;
            case 4:
                alienSpeed = 3.0;
                bulletInterval = 150;
                cannon.rotationSpeed = 3.0;
                break;
            case 5:
                alienSpeed = 4.0;
                bulletInterval = 100;
                cannon.rotationSpeed = 3.0;
                break;
        }
    }
    
    function gameLoop() {
        if (!gameActive) return;
        
        update();
        draw();
        
        requestAnimationFrame(gameLoop);
    }
    
    function update() {
        const currentTime = Date.now();
        const elapsedTime = (currentTime - gameStartTime) / 1000;
        
        updateTimerDisplay(elapsedTime);
        
        if (elapsedTime >= 300) {
            endGame(true);
            return;
        } else if (elapsedTime >= 240 && gameLevel < 5) {
            setLevelParameters(5);
            levelInfo.textContent = `NIVEL: ${gameLevel}`;
            bulletsFired = 0;
            updateBulletsCounter();
        } else if (elapsedTime >= 180 && gameLevel < 4) {
            setLevelParameters(4);
            levelInfo.textContent = `NIVEL: ${gameLevel}`;
            bulletsFired = 0;
            updateBulletsCounter();
        } else if (elapsedTime >= 120 && gameLevel < 3) {
            setLevelParameters(3);
            levelInfo.textContent = `NIVEL: ${gameLevel}`;
            bulletsFired = 0;
            updateBulletsCounter();
        } else if (elapsedTime >= 60 && gameLevel < 2) {
            setLevelParameters(2);
            levelInfo.textContent = `NIVEL: ${gameLevel}`;
            bulletsFired = 0;
            updateBulletsCounter();
        }
        
        if (keys.ArrowLeft) {
            cannon.angle = Math.min(90, cannon.angle + cannon.rotationSpeed);
        }
        if (keys.ArrowRight) {
            cannon.angle = Math.max(-90, cannon.angle - cannon.rotationSpeed);
        }
        
        const baseSpawnRate = 1200 - (gameLevel * 200);
        const spawnRate = Math.max(400, baseSpawnRate);
        
        if (currentTime - lastAlienSpawn > spawnRate) {
            spawnAlien();
            lastAlienSpawn = currentTime;
        }
        
        if (currentTime - lastBulletTime > bulletInterval) {
            fireBullet();
            lastBulletTime = currentTime;
        }
        
        if (cannon.muzzleFlash) {
            cannon.flashTime--;
            if (cannon.flashTime <= 0) {
                cannon.muzzleFlash = false;
            }
        }
        
        if (cannon.damaged) {
            cannon.damageTime--;
            if (cannon.damageTime <= 0) {
                cannon.damaged = false;
            }
        }
        
        for (let i = explosions.length - 1; i >= 0; i--) {
            const explosion = explosions[i];
            explosion.radius += (explosion.maxRadius - explosion.radius) / 3;
            explosion.duration--;
            
            if (explosion.duration <= 0) {
                explosions.splice(i, 1);
            }
        }
        
        for (let i = bombs.length - 1; i >= 0; i--) {
            const bomb = bombs[i];
            bomb.x += bomb.vx;
            bomb.y += bomb.vy;
            bomb.traveled += Math.sqrt(bomb.vx * bomb.vx + bomb.vy * bomb.vy);
            
            if (bomb.traveled >= bomb.maxDistance || 
                bomb.x < 0 || bomb.x > canvas.width || 
                bomb.y < 0 || bomb.y > canvas.height) {
                
                explosions.push({
                    x: bomb.x,
                    y: bomb.y,
                    radius: 10,
                    maxRadius: bomb.radius,
                    duration: 25,
                    color: '#ff0'
                });
                
                for (let j = aliens.length - 1; j >= 0; j--) {
                    if (distance(aliens[j], bomb) < bomb.radius) {
                        aliens.splice(j, 1);
                    }
                }
                
                bombs.splice(i, 1);
            }
        }
        
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].x += bullets[i].vx;
            bullets[i].y += bullets[i].vy;
            
            if (bullets[i].y < 0 || bullets[i].y > canvas.height || 
                bullets[i].x < 0 || bullets[i].x > canvas.width) {
                bullets.splice(i, 1);
                continue;
            }
            
            for (let j = aliens.length - 1; j >= 0; j--) {
                if (checkCollision(bullets[i], aliens[j])) {
                    if (aliens[j].type.shape === 'exploder') {
                        aliens[j].type.explode(aliens[j]);
                    }
                    
                    bullets.splice(i, 1);
                    aliens.splice(j, 1);
                    break;
                }
            }
        }
        
        for (let i = aliens.length - 1; i >= 0; i--) {
            const alien = aliens[i];
            
            const dx = cannon.x - alien.x;
            const dy = cannon.y - alien.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            alien.x += (dx / distance) * alienSpeed;
            alien.y += (dy / distance) * alienSpeed;
            
            if (checkCollision(alien, cannon)) {
                handleCannonHit();
                return;
            }
            
            if (alien.type.shape === 'exploder' && Math.random() < 0.003) {
                alien.type.explode(alien);
            }
            
            if (alien.y > canvas.height) {
                aliens.splice(i, 1);
            }
        }
    }
    
    function handleCannonHit() {
        lives--;
        updateLivesCounter();
        
        if (lives > 0) {
            cannon.damaged = true;
            cannon.damageTime = 60;
            
            bullets.length = 0;
            aliens.length = 0;
            lastAlienSpawn = Date.now();
            lastBulletTime = Date.now();
            bulletsFired = 0;
            updateBulletsCounter();
        } else {
            endGame(false);
        }
    }
    
    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (cannon.damaged) {
            ctx.fillStyle = `rgba(255, 0, 0, ${cannon.damageTime / 120})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        drawStars();
        
        drawCannon();
        
        bullets.forEach(bullet => {
            ctx.fillStyle = '#ff0';
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
            ctx.fill();
        });
        
        bombs.forEach(bomb => {
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(bomb.x, bomb.y, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ff0';
            ctx.beginPath();
            ctx.arc(bomb.x, bomb.y, 3, 0, Math.PI * 2);
            ctx.fill();
        });
        
        explosions.forEach(explosion => {
            ctx.fillStyle = explosion.color;
            ctx.globalAlpha = explosion.duration / 25;
            ctx.beginPath();
            ctx.arc(explosion.x, explosion.y, explosion.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        });
        
        aliens.forEach(alien => {
            ctx.save();
            ctx.translate(alien.x, alien.y);
            alien.type.draw(0, 0, 15);
            ctx.restore();
        });
    }
    
    function spawnAlien() {
        let type;
        if (gameLevel >= 4 && Math.random() < 0.25) {
            type = alienTypes[3];
        } else {
            type = alienTypes[Math.floor(Math.random() * 3)];
        }
        
        aliens.push({
            x: Math.random() * (canvas.width - 40) + 20,
            y: -20,
            width: 30,
            height: 30,
            type: type
        });
    }
    
    function fireBullet() {
        const angleRad = cannon.angle * Math.PI / 180;
        const barrelLength = 35;
        
        let baseSpeed;
        if (gameLevel <= 2) {
            baseSpeed = 4 + (gameLevel * 0.5);
        } else {
            baseSpeed = 6 + (gameLevel * 0.5);
        }
        
        let bulletCount, spread;
        if (gameLevel >= 5) {
            bulletCount = 5;
            spread = 0.1;
        } else if (gameLevel >= 4) {
            bulletCount = 3;
            spread = 0.15;
        } else {
            bulletCount = 1;
            spread = 0;
        }
        
        bulletsFired += bulletCount;
        updateBulletsCounter();
        
        for (let i = 0; i < bulletCount; i++) {
            const offset = (i - (bulletCount - 1) / 2) * spread;
            const bulletAngle = angleRad + offset;
            
            const bulletX = cannon.x - Math.sin(bulletAngle) * barrelLength;
            const bulletY = cannon.y - Math.cos(bulletAngle) * barrelLength;
            
            const vx = -Math.sin(bulletAngle) * baseSpeed;
            const vy = -Math.cos(bulletAngle) * baseSpeed;
            
            bullets.push({
                x: bulletX,
                y: bulletY,
                vx: vx,
                vy: vy
            });
        }
        
        cannon.muzzleFlash = true;
        cannon.flashTime = 5;
    }
    
    function fireBomb() {
        if (bombsLeft <= 0) return;
        
        const angleRad = cannon.angle * Math.PI / 180;
        const speed = 4;
        const distance = canvas.height / 2;
        
        bombs.push({
            x: cannon.x - Math.sin(angleRad) * 35,
            y: cannon.y - Math.cos(angleRad) * 35,
            vx: -Math.sin(angleRad) * speed,
            vy: -Math.cos(angleRad) * speed,
            traveled: 0,
            maxDistance: distance,
            radius: 60
        });
        
        bombsLeft--;
        updateBombsCounter();
    }
    
    function drawCannon() {
        ctx.save();
        ctx.translate(cannon.x, cannon.y);
        ctx.rotate(-cannon.angle * Math.PI / 180);
        
        if (cannon.damaged) {
            ctx.globalAlpha = 0.7 + Math.sin(Date.now() / 100) * 0.3;
        }
        
        ctx.fillStyle = '#444';
        ctx.fillRect(-30, 10, 60, 10);
        
        for (let i = -1; i <= 1; i++) {
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(i * 15, 15, 5, 0, Math.PI * 2);
            ctx.fill();
        }
        
        ctx.fillStyle = '#777';
        ctx.fillRect(-25, -5, 50, 15);
        
        ctx.fillStyle = '#555';
        ctx.beginPath();
        ctx.arc(0, -5, 25, 0, Math.PI);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = '#aaa';
        ctx.fillRect(-6, -35, 12, 35);
        
        ctx.fillStyle = '#888';
        ctx.fillRect(-4, -35, 8, 5);
        
        if (cannon.muzzleFlash) {
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(0, -35, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, -35, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        
        ctx.fillStyle = '#00f';
        ctx.fillRect(-8, -10, 16, 5);
        
        ctx.restore();
    }
    
    function drawStars() {
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 100; i++) {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            const size = Math.random() * 2;
            ctx.fillRect(x, y, size, size);
        }
    }
    
    function checkCollision(obj1, obj2) {
        const dx = obj1.x - obj2.x;
        const dy = obj1.y - obj2.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (obj1.width && obj2.width) {
            return distance < (obj1.width + obj2.width) / 2;
        }
        return distance < 20;
    }
    
    function distance(obj1, obj2) {
        const dx = obj1.x - obj2.x;
        const dy = obj1.y - obj2.y;
        return Math.sqrt(dx * dx + dy * dy);
    }
    
    function updateTimerDisplay(seconds) {
        const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
        const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
        timerDisplay.textContent = `TIEMPO: ${mins}:${secs}`;
    }
    
    function updateBombsCounter() {
        bombsCounter.textContent = `BOMBAS: ${bombsLeft}`;
    }
    
    function updateBulletsCounter() {
        bulletsCounter.textContent = `BALAS: ${bulletsFired}`;
    }
    
    function updateLivesCounter() {
        livesCounter.textContent = `VIDAS: ${lives}`;
    }
    
    function endGame(won) {
        gameActive = false;
        if (won) {
            winMessage.style.display = 'block';
        } else {
            loseMessage.style.display = 'block';
        }
    }
    
    function startGameAtLevel(level) {
        gameLevel = level;
        lives = 3;
        bombsLeft = 10;
        bulletsFired = 0;
        
        const baseTime = (level - 1) * 60000;
        gameStartTime = Date.now() - baseTime;
        
        setLevelParameters(level);
        initGame();
    }
    
    document.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        
        if (e.key === 'ArrowLeft') keys.ArrowLeft = true;
        if (e.key === 'ArrowRight') keys.ArrowRight = true;
        
        if (e.code === 'Space' && gameLevel >= 5) {
            fireBomb();
        }
        
        if (e.key >= '1' && e.key <= '5') {
            startGameAtLevel(parseInt(e.key));
        }
    });
    
    document.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft') keys.ArrowLeft = false;
        if (e.key === 'ArrowRight') keys.ArrowRight = false;
    });
    
    restartBtn.addEventListener('click', () => {
        lives = 3;
        bombsLeft = 10;
        bulletsFired = 0;
        startGameAtLevel(1);
    });
    
    exitBtn.addEventListener('click', () => window.close());
    
    startGameAtLevel(1);
</script>
</body>
</html>
